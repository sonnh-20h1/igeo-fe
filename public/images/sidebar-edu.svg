<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none" aria-labelledby="title desc">
  <title id="title">Lumio Education Sidebar Illustration</title>
  <desc id="desc">A friendly flat illustration of a graduation cap, book and pencil for an education app sidebar.</desc>
  <rect width="160" height="160" rx="20" fill="#EEF2FF"/>

  <!-- Book -->
  <g transform="translate(28,38)">
    <rect x="6" y="20" width="84" height="54" rx="6" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
    <path d="M6 20c0 0 12-8 42-8s42 8 42 8" fill="#EEF2FF"/>
    <rect x="10" y="24" width="36" height="46" rx="4" fill="#E0E7FF"/>
    <rect x="56" y="24" width="30" height="46" rx="4" fill="#FFFFFF"/>
    <line x1="26" y1="40" x2="46" y2="40" stroke="#BFDBFE" stroke-width="2" stroke-linecap="round"/>
    <line x1="26" y1="50" x2="46" y2="50" stroke="#BFDBFE" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Graduation cap -->
  <g transform="translate(48,14)">
    <polygon points="32,22 8,34 32,46 56,34" fill="#4338CA"/>
    <rect x="28" y="30" width="8" height="18" rx="2" fill="#1E3A8A" transform="translate(0,6) rotate(-8 32 39)"/>
    <circle cx="60" cy="46" r="4" fill="#FBBF24"/>
    <path d="M60 46v12" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Pencil -->
  <g transform="translate(86,78) rotate(-18 0 0)">
    <rect x="0" y="0" width="50" height="10" rx="2" fill="#FDE68A"/>
    <rect x="44" y="0" width="8" height="10" fill="#F97316"/>
    <polygon points="0,0 -6,5 0,10" fill="#F87171"/>
    <rect x="2" y="2" width="34" height="6" rx="1" fill="#FBF5FF" opacity="0.2"/>
  </g>

  <!-- Accent circles -->
  <circle cx="132" cy="28" r="6" fill="#60A5FA" opacity="0.12"/>
  <circle cx="24" cy="124" r="8" fill="#86EFAC" opacity="0.14"/>

</svg>
